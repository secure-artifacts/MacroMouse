<svg viewBox="0 0 640 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4b5563"/>
    </marker>
  </defs>

  <rect width="640" height="640" fill="#ffffff"/>

  <!-- center point -->
  <circle cx="320" cy="320" r="10" fill="#111827"/>
  <text x="320" y="360" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6b7280">右键按下的位置</text>

  <!-- 8 direction lines -->
  <g stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)">
    <line x1="320" y1="320" x2="320" y2="150"/>  <!-- up -->
    <line x1="320" y1="320" x2="320" y2="490"/>  <!-- down -->
    <line x1="320" y1="320" x2="490" y2="320"/>  <!-- right -->
    <line x1="320" y1="320" x2="150" y2="320"/>  <!-- left -->
    <line x1="320" y1="320" x2="440" y2="200"/>  <!-- up-right -->
    <line x1="320" y1="320" x2="200" y2="200"/>  <!-- up-left -->
    <line x1="320" y1="320" x2="440" y2="440"/>  <!-- down-right -->
    <line x1="320" y1="320" x2="200" y2="440"/>  <!-- down-left -->
  </g>

  <!-- labels -->
  <g font-family="sans-serif" text-anchor="middle">
    <text x="320" y="130" font-size="16" font-weight="bold" fill="#111827">↑ 上滑</text>
    <text x="320" y="150" font-size="13" fill="#059669">复制</text>

    <text x="320" y="525" font-size="16" font-weight="bold" fill="#111827">↓ 下滑</text>
    <text x="320" y="545" font-size="13" fill="#059669">粘贴</text>

    <text x="530" y="316" font-size="16" font-weight="bold" fill="#111827">→ 右滑</text>
    <text x="530" y="336" font-size="13" fill="#059669">随机文本</text>

    <text x="110" y="316" font-size="16" font-weight="bold" fill="#111827">← 左滑</text>
    <text x="110" y="336" font-size="13" fill="#059669">剪切</text>

    <text x="460" y="180" font-size="15" font-weight="bold" fill="#111827">↗ 右上滑</text>
    <text x="460" y="198" font-size="12" fill="#2563eb">最大化/全屏</text>

    <text x="180" y="180" font-size="15" font-weight="bold" fill="#111827">↖ 左上滑</text>
    <text x="180" y="198" font-size="12" fill="#9ca3af">未分配</text>

    <text x="460" y="470" font-size="15" font-weight="bold" fill="#111827">↘ 右下滑</text>
    <text x="460" y="488" font-size="12" fill="#9ca3af">未分配</text>

    <text x="180" y="470" font-size="15" font-weight="bold" fill="#111827">↙ 左下滑</text>
    <text x="180" y="488" font-size="12" fill="#2563eb">最小化</text>
  </g>

  <!-- double click callout -->
  <g font-family="sans-serif">
    <rect x="30" y="30" width="300" height="70" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="45" y="55" font-size="13" font-weight="bold" fill="#b91c1c">⚡ 右键快速双击（不拖动）</text>
    <text x="45" y="75" font-size="12" fill="#b91c1c">→ 回车（危险操作，需在系统双击间隔内完成）</text>
    <text x="45" y="92" font-size="11" fill="#9ca3af">超时或位置偏移过大则不触发</text>
  </g>
</svg>
