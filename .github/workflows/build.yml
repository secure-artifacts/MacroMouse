name: Build MacroMouse
on:
  push:
    branches: [ main ]   # 日常 push 只构建，不触发 Release/attest（见下方 if 条件）
    tags: [ 'v*' ]        # 平台 L2 校验要求：Release 必须由 tag push 触发
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14   # Apple Silicon runner, Xcode 15+
    permissions:
      contents: write       # 没有这个会导致上传 Release 时报 "Resource not accessible by integration"
      id-token: write       # OIDC 签名身份，构建证明需要
      attestations: write   # 写入构建证明记录

    strategy:
      fail-fast: false   # 一个架构失败不影响另一个架构继续构建
      matrix:
        include:
          - arch: arm64
            label: macOS    # M 系列芯片
          - arch: x86_64
            label: Intel    # Intel 芯片

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Swift version
        run: swift --version

      - name: Build & Package (${{ matrix.label }})
        run: |
          chmod +x build.sh
          ./build.sh ${{ matrix.arch }}

      - name: Debug - list dist contents
        run: |
          echo "==== dist 目录内容 ===="
          ls -laR dist/ || echo "dist 目录不存在，build.sh 没有正确产出"

      - name: Upload artifact (${{ matrix.label }})
        uses: actions/upload-artifact@v4
        with:
          name: MacroMouse-${{ matrix.label }}
          path: dist/MacroMouse-${{ matrix.label }}.zip
          retention-days: 7

      # 生成构建证明（密码学签名，证明该 zip 确实由本仓库在 GitHub 官方 runner 上构建）
      - name: Attest build provenance
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/MacroMouse-${{ matrix.label }}.zip'

      # 仅在 tag push 时上传到 GitHub Releases（平台要求：只能由 tag push 触发，不能用 release 事件）
      - name: Upload to Release (${{ matrix.label }})
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MacroMouse-${{ matrix.label }}.zip
