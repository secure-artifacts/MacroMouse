name: Build MacroMouse

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: macos-14   # Apple Silicon runner, Xcode 15+
    permissions:
      contents: write    # 没有这个会导致上传 Release 时报 "Resource not accessible by integration"

    strategy:
      fail-fast: false   # 一个架构失败不影响另一个架构继续构建
      matrix:
        include:
          - arch: arm64
            label: macOS    # M 系列芯片
          - arch: x86_64
            label: Intel    # Intel 芯片

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Swift version
        run: swift --version

      - name: Build & Package (${{ matrix.label }})
        run: |
          chmod +x build.sh
          ./build.sh ${{ matrix.arch }}

      - name: Debug - list dist contents
        run: |
          echo "==== dist 目录内容 ===="
          ls -laR dist/ || echo "dist 目录不存在，build.sh 没有正确产出"

      - name: Upload artifact (${{ matrix.label }})
        uses: actions/upload-artifact@v4
        with:
          name: MacroMouse-${{ matrix.label }}
          path: dist/MacroMouse-${{ matrix.label }}.zip
          retention-days: 7

      # 仅在 Release 时上传到 GitHub Releases（tag push 或网页创建 release 都会触发）
      - name: Upload to Release (${{ matrix.label }})
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MacroMouse-${{ matrix.label }}.zip
