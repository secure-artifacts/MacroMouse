name: Build MacroMouse

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Swift version
        run: swift --version

      - name: Build arm64 (M 芯片)
        run: |
          chmod +x build.sh
          ./build.sh arm64

      - name: Upload arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacroMouse-macOS
          path: dist/MacroMouse-*.zip
          retention-days: 7

      - name: Upload to Release (arm64)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MacroMouse-*.zip
