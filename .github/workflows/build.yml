name: Build MacroMouse

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Swift version
        run: swift --version

      - name: Build & Package (arm64)
        run: |
          chmod +x build.sh
          ./build.sh arm64

      # ── 每次 push/PR 都上传 artifact，7天内可在 Actions 页面下载 ──
      - name: Upload artifact (every push)
        uses: actions/upload-artifact@v4
        with:
          name: MacroMouse-macOS-arm64
          path: dist/MacroMouse-*.zip
          retention-days: 7

      # ── 仅在创建 Release 时附加到 Release 页面 ──
      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MacroMouse-*.zip