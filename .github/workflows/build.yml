name: Build MacroMouse
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            label: macOS
          - arch: x86_64
            label: Intel
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'
      - name: Swift version
        run: swift --version
      - name: Build & Package (${{ matrix.label }})
        run: |
          chmod +x build.sh
          ./build.sh ${{ matrix.arch }}
      - name: Dynamic Rename with Version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="dev"
          fi

          if [ "${{ matrix.arch }}" = "arm64" ]; then
            NEW_NAME="MacroMouse-macOS-${VERSION}.zip"
            mv dist/MacroMouse-macOS.zip dist/${NEW_NAME}
          else
            NEW_NAME="Mouse-intel-${VERSION}.zip"
            mv dist/MacroMouse-Intel.zip dist/${NEW_NAME}
          fi

          echo "ZIP_NAME=${NEW_NAME}" >> $GITHUB_ENV
      - name: Debug - list dist contents
        run: |
          echo "==== dist 目录内容 ===="
          ls -laR dist/ || echo "dist 目录不存在"
      - name: Upload artifact (${{ matrix.label }})
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: dist/${{ env.ZIP_NAME }}
          retention-days: 7
      - name: Attest build provenance
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/${{ env.ZIP_NAME }}'
      - name: Upload to Release (${{ matrix.label }})
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ZIP_NAME }}