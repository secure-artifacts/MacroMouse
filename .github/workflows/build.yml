name: Build MacroMouse
on:
  push:
    branches: [ main ]   # 日常 push 只构建，不触发 Release/attest
    tags: [ 'v*' ]        # 平台 L2 校验要求：Release 必须由 tag push 触发
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14   # Apple Silicon runner, Xcode 15+
    permissions:
      contents: write       # 上传 Release 必备权限
      id-token: write       # OIDC 签名身份，构建证明需要
      attestations: write   # 写入构建证明记录

    strategy:
      fail-fast: false   # 一个架构失败不影响另一个架构继续构建
      matrix:
        include:
          - arch: arm64
            label: macOS    # M 系列芯片
          - arch: x86_64
            label: Intel    # Intel 芯片

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Swift version
        run: swift --version

      - name: Build & Package (${{ matrix.label }})
        run: |
          chmod +x build.sh
          ./build.sh ${{ matrix.arch }}

      # ✨ 根据规则动态重命名，并自动注入当前版本号
      - name: Dynamic Rename with Version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="v1.0.4"
          fi
          
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            NEW_NAME="MacroMouse-macOS-${VERSION}.zip"
            mv dist/MacroMouse-macOS.zip dist/${NEW_NAME}
          else
            NEW_NAME="Mouse-intel-${VERSION}.zip"
            mv dist/MacroMouse-Intel.zip dist/${NEW_NAME}
          fi
          
          echo "ZIP_NAME=${NEW_NAME}" >> $GITHUB_ENV

      - name: Debug - list dist contents
        run: |
          echo "==== dist 目录内容 ===="
          ls -laR dist/ || echo "dist 目录不存在"

      - name: Upload artifact (${{ matrix.label }})
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: dist/${{ env.ZIP_NAME }}
          retention-days: 7

      # 生成构建证明
      - name: Attest build provenance
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/${{ env.ZIP_NAME }}'

      # 上传到 GitHub Releases
      - name: Upload to Release (${{ matrix.label }})
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ZIP_NAME }}
